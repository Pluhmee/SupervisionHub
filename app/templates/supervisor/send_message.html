{% extends "base.html" %}
{% block title %}Send Message{% endblock %}
{% block page_title %}Compose Message{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card stat-card p-4">
      <h5 class="fw-bold mb-4"><i class="bi bi-envelope-plus me-2 text-primary"></i>New Message</h5>
      <form method="POST" action="{{ url_for('supervisor.send_message') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">To (Student) <span class="text-danger">*</span></label>
          <select class="form-select" name="receiver_id" required>
            <option value="">-- Select student --</option>
            {% for st in students %}
            <option value="{{ st.user_id }}">{{ st.full_name }} ({{ st.matric_no or 'N/A' }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Subject</label>
          <input type="text" class="form-control" name="subject" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Message <span class="text-danger">*</span></label>
          <textarea class="form-control" name="message_body" rows="6" required></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Send Message</button>
          <a href="{{ url_for('supervisor.messages') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
