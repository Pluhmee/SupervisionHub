{% extends "base.html" %}
{% block title %}Create Project{% endblock %}
{% block page_title %}Create Project{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card stat-card p-4">
      <h5 class="fw-bold mb-4"><i class="bi bi-folder-plus me-2 text-primary"></i>New Project</h5>
      <form method="POST" action="{{ url_for('student.create_project') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Project Title <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="project_title" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Category</label>
          <input type="text" class="form-control" name="category" placeholder="e.g. Computer Science" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea class="form-control" name="project_description" rows="4"
                    placeholder="Brief overview of the project…"></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Create Project</button>
          <a href="{{ url_for('student.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
