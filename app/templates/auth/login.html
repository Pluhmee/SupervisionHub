{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block public_content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-sm-8">
    <div class="card shadow-sm border-0 p-4">
      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='lasu_logo.png') }}"
             alt="LASU Logo" style="width:72px;height:72px;object-fit:contain" />
        <h4 class="fw-bold mt-3" class="text-dark">SupervisionHub</h4>
        <p class="text-muted small">Sign in to your account</p>
      </div>
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" class="form-control" name="email" autofocus required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" name="password" required />
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe" />
          <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>
      </form>
      <p class="text-center text-muted small mt-3 mb-0">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
