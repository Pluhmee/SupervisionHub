{% extends "base.html" %}
{% block title %}Add Milestone{% endblock %}
{% block page_title %}Add Milestone{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card stat-card p-4">
      <h5 class="fw-bold mb-1"><i class="bi bi-flag me-2 text-primary"></i>Add Milestone</h5>
      <p class="text-muted small mb-4">Project: <strong>{{ project.project_title }}</strong></p>

      <form method="POST"
            action="{{ url_for('admin.add_milestone', project_id=project.project_id) }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Milestone Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="milestone_name"
                 placeholder="e.g. Chapter 1 Submission" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea class="form-control" name="milestone_description" rows="3"
                    placeholder="What should the student submit?"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Deadline</label>
          <input type="date" class="form-control" name="deadline" />
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Add Milestone</button>
          <a href="{{ url_for('admin.projects') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
